<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Honmoku Tree Map — Editor</title>
  <!-- MapLibre CSS -->
  <link rel="stylesheet" href="https://esm.sh/maplibre-gl@4/dist/maplibre-gl.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f8f9fa; }
    
    #toolbar { 
      padding: 10px; background: #fff; display: flex; gap: 10px; flex-wrap: wrap; 
      align-items: center; border-bottom: 1px solid #ddd; height: 46px; position: sticky; top: 0; z-index: 10;
    }
    #toolbar button { padding: 6px 12px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background: #f1f1f1; }
    #toolbar button:hover { background: #e2e2e2; }
    
    /* ✅ CRITICAL: Explicit dimensions prevent black screen */
    #map { height: calc(100vh - 46px); width: 100%; position: relative; }
    
    /* Modal */
    #edit-form { 
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
      background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.25); 
      z-index: 1000; width: 90%; max-width: 420px; max-height: 85vh; overflow-y: auto; 
    }
    #edit-form h3 { margin-bottom: 12px; }
    #edit-form label { display: block; margin-top: 12px; font-weight: 500; font-size: 14px; }
    #edit-form input, #edit-form textarea, #edit-form select { 
      width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 4px; 
    }
    #edit-form .btn-group { margin-top: 16px; display: flex; gap: 10px; }
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
    .height-options { display: flex; gap: 12px; margin-top: 6px; flex-wrap: wrap; }
    .height-options label { display: flex; align-items: center; gap: 4px; font-weight: normal; margin-top: 12px; cursor: pointer; }
    .height-options input { margin: 0; width: auto; }
    
    /* MapLibre cursor fixes */
    .maplibregl-canvas-container { cursor: grab; }
    .maplibregl-canvas-container:active { cursor: grabbing; }
  </style>
</head>
<body>

  <div id="toolbar">
    <strong>🌳 Honmoku Tree Map</strong>
    <button id="btn-add">+ Add tree</button>
    <button id="btn-undo">↩ Undo</button>
    <button id="btn-export-geojson">⬇ Export GeoJSON</button>
    <button id="btn-export-csv">⬇ Export CSV</button>
  </div>

  <div id="map"></div>

  <div class="overlay" id="overlay"></div>
  <div id="edit-form">
    <h3>Edit tree</h3>
    <label>Species (English)<input type="text" id="species-en"></label>
    <label>Species (Japanese)<input type="text" id="species-jp"></label>
    <label>Species (Latin)<input type="text" id="species-latin"></label>
    
    <label>Tree height (m)</label>
    <div class="height-options">
      <label><input type="radio" name="height" value="<5"> < 5 m</label>
      <label><input type="radio" name="height" value="5-10"> 5 – 10 m</label>
      <label><input type="radio" name="height" value="10-20"> 10 – 20 m</label>
      <label><input type="radio" name="height" value=">20"> > 20 m</label>
    </div>

    <label>Canopy area (m²)<input type="number" step="0.1" id="canopy"></label>
    <label>Estimated age (years)<input type="number" id="age"></label>
    <label>Notes<textarea id="notes" rows="2"></textarea></label>
    <label>Photo URL<input type="url" id="photo-url"></label>
    
    <div class="btn-group">
      <button id="btn-save">💾 Save</button>
      <button id="btn-delete">🗑 Delete</button>
      <button id="btn-cancel">✕ Cancel</button>
    </div>
  </div>

  <!-- ✅ ES Module Script -->
  <script type="module">
    import maplibregl from 'https://esm.sh/maplibre-gl@4';
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://xgnoqhikgvpltpbcgfwu.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_YsWANJ0xdGaHlg3gtjvhww_CXUowKri';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Initialize Map
const map = new maplibregl.Map({
  container: "map",
  style: {
    version: 8,
    sources: {
      satellite: {
        type: "raster",
        tiles: [
          "https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg"
        ],
        tileSize: 256,
        maxzoom: 18,
        attribution: "国土地理院"
      }
    },
    layers: [{ id: "satellite", type: "raster", source: "satellite" }]
  },
  center: [139.6585, 35.4230],
  zoom: 15,
  maxZoom: 21,
});

map.addControl(new maplibregl.NavigationControl(), "top-right");
map.addControl(new maplibregl.ScaleControl(), "bottom-right");


    // UI State
    const form = document.getElementById('edit-form');
    const overlay = document.getElementById('overlay');
    let currentTreeId = null;
    let undoStack = [];

    // 🔹 Setup layers & clustering after map loads
    map.on('load', () => {
      map.addSource('trees', {
        type: 'geojson',
        data: { type: 'FeatureCollection', features: [] },
        cluster: true,
        clusterMaxZoom: 14,
        clusterRadius: 50
      });

      // Cluster circles
      map.addLayer({
        id: 'tree-clusters',
        type: 'circle',
        source: 'trees',
        filter: ['has', 'point_count'],
        paint: {
          'circle-color': '#3b82f6',
          'circle-radius': ['step', ['get', 'point_count'], 20, 100, 30, 750, 40]
        }
      });

      // Unclustered points
      map.addLayer({
        id: 'tree-points',
        type: 'circle',
        source: 'trees',
        filter: ['!', ['has', 'point_count']],
        paint: { 'circle-radius': 7, 'circle-color': '#22c55e' }
      });

      // Cursors
      map.on('mouseenter', 'tree-clusters', () => map.getCanvas().style.cursor = 'pointer');
      map.on('mouseleave', 'tree-clusters', () => map.getCanvas().style.cursor = 'grab');
      map.on('mouseenter', 'tree-points', () => map.getCanvas().style.cursor = 'pointer');
      map.on('mouseleave', 'tree-points', () => map.getCanvas().style.cursor = 'grab');

      // Cluster click -> zoom in
      map.on('click', 'tree-clusters', (e) => {
        const features = map.queryRenderedFeatures(e.point, { layers: ['tree-clusters'] });
        const clusterId = features[0].properties.cluster_id;
        map.getSource('trees').getClusterExpansionZoom(clusterId, (err, zoom) => {
          if (!err) map.easeTo({ center: features[0].geometry.coordinates, zoom });
        });
      });

      // Point click -> open edit form
      map.on('click', 'tree-points', (e) => {
        const props = e.features[0].properties;
        openEditForm(props.id);
      });

      loadTrees();
    });

    // 🔹 UI Handlers
    document.getElementById('btn-add').addEventListener('click', () => {
      currentTreeId = null;
      clearForm();
      openForm();
    });

    document.getElementById('btn-cancel').addEventListener('click', closeForm);
    overlay.addEventListener('click', closeForm);

    document.getElementById('btn-undo').addEventListener('click', () => {
      if (undoStack.length === 0) return alert('Nothing to undo');
      const action = undoStack.pop();
      console.log('Undo requested:', action);
      alert(`Undo triggered for: ${action.type}. (For production: implement soft-deletes or DB transactions)`);
    });

    function openForm() {
      form.style.display = 'block';
      overlay.style.display = 'block';
    }
    function closeForm() {
      form.style.display = 'none';
      overlay.style.display = 'none';
      currentTreeId = null;
    }
    function clearForm() {
      form.querySelectorAll('input, textarea').forEach(el => el.value = '');
      form.querySelectorAll('input[name="height"]').forEach(el => el.checked = false);
    }

    async function openEditForm(id) {
      currentTreeId = id;
      const { data, error } = await supabase.from('trees').select('*').eq('id', id).single();
      if (error || !data) return alert('Failed to load tree data');

      document.getElementById('species-en').value = data.species_en || '';
      document.getElementById('species-jp').value = data.species_jp || '';
      document.getElementById('species-latin').value = data.species_latin || '';
      document.getElementById('canopy').value = data.canopy_area ?? '';
      document.getElementById('age').value = data.age ?? '';
      document.getElementById('notes').value = data.notes || '';
      document.getElementById('photo-url').value = data.photo_url || '';
      
      const hr = document.querySelector(`input[name="height"][value="${data.height_range}"]`);
      if (hr) hr.checked = true;
      openForm();
    }

    // 🔹 Save / Delete
    document.getElementById('btn-save').addEventListener('click', async () => {
      const payload = {
        species_en: document.getElementById('species-en').value,
        species_jp: document.getElementById('species-jp').value,
        species_latin: document.getElementById('species-latin').value,
        height_range: document.querySelector('input[name="height"]:checked')?.value || null,
        canopy_area: document.getElementById('canopy').value ? parseFloat(document.getElementById('canopy').value) : null,
        age: document.getElementById('age').value ? parseInt(document.getElementById('age').value) : null,
        notes: document.getElementById('notes').value,
        photo_url: document.getElementById('photo-url').value
      };

      try {
        if (currentTreeId) {
          await supabase.from('trees').update(payload).eq('id', currentTreeId);
          undoStack.push({ type: 'update', id: currentTreeId });
        } else {
          const center = map.getCenter();
          payload.latitude = center.lat;
          payload.longitude = center.lng;
          await supabase.from('trees').insert([payload]);
          undoStack.push({ type: 'insert' });
        }
        closeForm();
        await loadTrees();
      } catch (err) {
        console.error('Save failed:', err);
        alert('Failed to save. Check console.');
      }
    });

    document.getElementById('btn-delete').addEventListener('click', async () => {
      if (!currentTreeId) return alert('No tree selected');
      if (!confirm('Permanently delete this tree?')) return;
      try {
        await supabase.from('trees').delete().eq('id', currentTreeId);
        undoStack.push({ type: 'delete', id: currentTreeId });
        closeForm();
        await loadTrees();
      } catch (err) {
        console.error('Delete failed:', err);
        alert('Failed to delete.');
      }
    });

    // 🔹 Data Loading
    async function loadTrees() {
      try {
        const { data, error } = await supabase.from('trees').select('*');
        if (error) throw error;

        const geojson = {
          type: 'FeatureCollection',
          features: (data || []).filter(t => t.latitude && t.longitude).map(t => ({
            type: 'Feature',
            geometry: { type: 'Point', coordinates: [t.longitude, t.latitude] },
            properties: t
          }))
        };

        // Efficiently update WebGL source without recreating layers
        if (map.getSource('trees')) {
          map.getSource('trees').setData(geojson);
        }
      } catch (err) {
        console.error('Load failed:', err);
      }
    }

    // 🔹 Exports
    document.getElementById('btn-export-geojson').addEventListener('click', async () => {
      const { data } = await supabase.from('trees').select('*');
      if (!data?.length) return alert('No trees to export');
      const geojson = {
        type: 'FeatureCollection',
        features: data.filter(t => t.latitude && t.longitude).map(t => ({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [t.longitude, t.latitude] },
          properties: t
        }))
      };
      downloadFile(JSON.stringify(geojson, null, 2), 'honmoku-trees.geojson', 'application/json');
    });

    document.getElementById('btn-export-csv').addEventListener('click', async () => {
      const { data } = await supabase.from('trees').select('*');
      if (!data?.length) return alert('No trees to export');
      const headers = Object.keys(data[0]);
      const rows = data.map(row => headers.map(h => `"${(row[h] ?? '').toString().replace(/"/g, '""')}"`).join(','));
      downloadFile([headers.join(','), ...rows].join('\n'), 'honmoku-trees.csv', 'text/csv');
    });

    function downloadFile(content, filename, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
