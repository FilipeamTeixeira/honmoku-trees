<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Honmoku Tree Map — Editor</title>

  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
    }

    /* ── Header ──────────────────────────────────��──── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: rgba(10, 10, 10, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      gap: 12px;
      flex-wrap: wrap;
    }
    header h1 { font-size: 16px; font-weight: 600; white-space: nowrap; }
    header h1 span { color: #4ade80; }
    .stats { font-size: 13px; color: #888; white-space: nowrap; }
    .stats b { color: #4ade80; }

    .toolbar { display: flex; gap: 8px; align-items: center; }
    .toolbar button {
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #e0e0e0;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .toolbar button:hover { background: rgba(255,255,255,0.1); }
    .toolbar button.active { background: #16a34a; border-color: #16a34a; color: #fff; }
    .toolbar button.export-btn { background: #2563eb; border-color: #2563eb; }
    .toolbar button.export-btn:hover { background: #1d4ed8; }

    /* ���─ Map ────────────────────────────────────────── */
    #map { position: fixed; top: 0; bottom: 0; left: 0; right: 0; }

    /* ── Side Panel ─────────────────────────────────── */
    .panel {
      position: fixed;
      top: 56px; right: 0; bottom: 0;
      width: 320px;
      background: rgba(15, 15, 15, 0.95);
      backdrop-filter: blur(12px);
      border-left: 1px solid rgba(255,255,255,0.06);
      z-index: 15;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      overflow-y: auto;
      padding: 20px;
    }
    .panel.open { transform: translateX(0); }
    .panel h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #4ade80; }
    .panel label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
      margin-top: 12px;
    }
    .panel input, .panel textarea, .panel select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #e0e0e0;
      font-size: 13px;
      font-family: inherit;
    }
    .panel input:focus, .panel textarea:focus {
      outline: none;
      border-color: #4ade80;
    }
    .panel textarea { resize: vertical; min-height: 60px; }
    .panel-buttons {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }
    .panel-buttons button {
      flex: 1;
      padding: 8px 0;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-save { background: #16a34a; color: #fff; }
    .btn-save:hover { background: #15803d; }
    .btn-delete { background: #dc2626; color: #fff; }
    .btn-delete:hover { background: #b91c1c; }
    .btn-cancel { background: rgba(255,255,255,0.1); color: #ccc; }
    .btn-cancel:hover { background: rgba(255,255,255,0.15); }

    /* ── Legend ──────────────────────────────────────── */
    .legend {
      position: fixed;
      bottom: 32px; left: 24px;
      z-index: 10;
      background: rgba(20, 20, 20, 0.9);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 12px;
    }
    .legend-title { font-weight: 600; margin-bottom: 8px; font-size: 13px; }
    .legend-item { display: flex; align-items: center; gap: 8px; padding: 2px 0; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

    /* ── Toast ───────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(20,20,20,0.95);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 13px;
      z-index: 30;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Crosshair when adding ──────────────────────── */
    .crosshair .maplibregl-canvas { cursor: crosshair !important; }
  </style>
</head>

<body>

<header>
  <h1>🌳 Honmoku <span>Tree Map</span></h1>
  <div class="stats" id="stats"></div>
  <div class="toolbar">
    <button id="btn-add" title="Click map to add a tree">+ Add tree</button>
    <button id="btn-undo" title="Undo last action">↩ Undo</button>
    <button class="export-btn" id="btn-export" title="Download edited GeoJSON">⬇ Export GeoJSON</button>
    <button class="export-btn" id="btn-csv" title="Download as CSV">⬇ Export CSV</button>
  </div>
</header>

<div id="map"></div>

<!-- Edit / New tree panel -->
<div class="panel" id="panel">
  <h2 id="panel-title">Edit tree</h2>

  <label>Species (English)</label>
  <input type="text" id="f-species-en" placeholder="e.g. Japanese Black Pine" />

  <label>Species (Japanese)</label>
  <input type="text" id="f-species-jp" placeholder="e.g. クロマツ" />

  <label>Species (Latin)</label>
  <input type="text" id="f-species-lat" placeholder="e.g. Pinus thunbergii" />

  <label>Height (m)</label>
  <input type="number" id="f-height" step="0.1" />

  <label>Canopy area (m²)</label>
  <input type="number" id="f-canopy" step="0.1" />

  <label>Estimated age (years)</label>
  <input type="number" id="f-age" />

  <label>Notes</label>
  <textarea id="f-notes" placeholder="Any notes about this tree..."></textarea>

  <label>Photo URL</label>
  <input type="text" id="f-photo" placeholder="https://..." />

  <div class="panel-buttons">
    <button class="btn-save" id="btn-save">💾 Save</button>
    <button class="btn-delete" id="btn-delete">🗑 Delete</button>
    <button class="btn-cancel" id="btn-close">✕ Cancel</button>
  </div>
</div>

<div class="legend">
  <div class="legend-title">Tree height</div>
  <div class="legend-item"><div class="legend-dot" style="background:#86efac"></div> &lt; 5 m</div>
  <div class="legend-item"><div class="legend-dot" style="background:#4ade80"></div> 5 – 10 m</div>
  <div class="legend-item"><div class="legend-dot" style="background:#16a34a"></div> 10 – 20 m</div>
  <div class="legend-item"><div class="legend-dot" style="background:#166534"></div> &gt; 20 m</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================================
// STATE
// ============================================================================
let treeData = null;      // the live GeoJSON FeatureCollection
let editingId = null;     // which tree is selected
let addMode = false;      // click-to-add mode
let history = [];         // undo stack (snapshots of treeData)
let nextId = 1;

// ============================================================================
// MAP SETUP
// ============================================================================
const map = new maplibregl.Map({
  container: "map",
  style: {
    version: 8,
    sources: {
      satellite: {
        type: "raster",
        tiles: [
          "https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg"
        ],
        tileSize: 256,
        maxzoom: 18,
        attribution: "国土地理院"
      }
    },
    layers: [{ id: "satellite", type: "raster", source: "satellite" }]
  },
  center: [139.6585, 35.4230],
  zoom: 15,
  maxZoom: 21,
});

map.addControl(new maplibregl.NavigationControl(), "top-right");
map.addControl(new maplibregl.ScaleControl(), "bottom-right");

// ============================================================================
// LOAD DATA
// ============================================================================
map.on("load", async () => {
  const res = await fetch("trees.geojson");
  treeData = await res.json();

  // Ensure every feature has an id
  treeData.features.forEach((f, i) => {
    if (!f.properties.id) f.properties.id = i + 1;
    nextId = Math.max(nextId, f.properties.id + 1);
  });

  map.addSource("trees", { type: "geojson", data: treeData });

  map.addLayer({
    id: "tree-circles",
    type: "circle",
    source: "trees",
    paint: {
      "circle-radius": ["interpolate", ["linear"], ["zoom"], 13, 3, 16, 6, 19, 12],
      "circle-color": [
        "step", ["coalesce", ["get", "height_m"], 0],
        "#86efac", 5, "#4ade80", 10, "#16a34a", 20, "#166534"
      ],
      "circle-opacity": 0.85,
      "circle-stroke-width": 1.5,
      "circle-stroke-color": "rgba(255,255,255,0.2)"
    }
  });

  // Selected tree highlight
  map.addLayer({
    id: "tree-selected",
    type: "circle",
    source: "trees",
    filter: ["==", ["get", "id"], -1],
    paint: {
      "circle-radius": ["interpolate", ["linear"], ["zoom"], 13, 5, 16, 9, 19, 16],
      "circle-color": "transparent",
      "circle-stroke-width": 3,
      "circle-stroke-color": "#facc15"
    }
  });

  updateStats();

  // Click tree → edit
  map.on("click", "tree-circles", (e) => {
    if (addMode) return;
    const f = e.features[0];
    selectTree(f.properties.id);
    e.preventDefault();
  });

  // Click map (not on tree) → add if in add mode
  map.on("click", (e) => {
    if (!addMode) return;
    if (e.defaultPrevented) return;
    addTree(e.lngLat.lng, e.lngLat.lat);
  });

  map.on("mouseenter", "tree-circles", () => {
    if (!addMode) map.getCanvas().style.cursor = "pointer";
  });
  map.on("mouseleave", "tree-circles", () => {
    if (!addMode) map.getCanvas().style.cursor = "";
  });
});

// ============================================================================
// TREE OPERATIONS
// ============================================================================

function saveSnapshot() {
  history.push(JSON.stringify(treeData));
  if (history.length > 50) history.shift();
}

function refreshMap() {
  map.getSource("trees").setData(treeData);
  updateStats();
}

function updateStats() {
  const n = treeData.features.length;
  const avg = n > 0
    ? (treeData.features.reduce((s, f) => s + (f.properties.height_m || 0), 0) / n).toFixed(1)
    : 0;
  document.getElementById("stats").innerHTML = `<b>${n}</b> trees · avg <b>${avg} m</b>`;
}

function selectTree(id) {
  const f = treeData.features.find(f => f.properties.id === id);
  if (!f) return;
  editingId = id;

  map.setFilter("tree-selected", ["==", ["get", "id"], id]);

  document.getElementById("panel-title").textContent = `Tree #${id}`;
  document.getElementById("f-species-en").value  = f.properties.species_en  || "";
  document.getElementById("f-species-jp").value  = f.properties.species_jp  || "";
  document.getElementById("f-species-lat").value = f.properties.species_lat || "";
  document.getElementById("f-height").value      = f.properties.height_m    || "";
  document.getElementById("f-canopy").value      = f.properties.canopy_m2   || "";
  document.getElementById("f-age").value         = f.properties.age_years   || "";
  document.getElementById("f-notes").value       = f.properties.notes       || "";
  document.getElementById("f-photo").value       = f.properties.photo_url   || "";

  document.getElementById("btn-delete").style.display = "block";
  document.getElementById("panel").classList.add("open");
}

function addTree(lng, lat) {
  saveSnapshot();

  const id = nextId++;
  const feature = {
    type: "Feature",
    geometry: { type: "Point", coordinates: [lng, lat] },
    properties: {
      id,
      height_m: null,
      canopy_m2: null,
      species_en: "",
      species_jp: "",
      species_lat: "",
      age_years: null,
      notes: "Manually added",
      photo_url: ""
    }
  };

  treeData.features.push(feature);
  refreshMap();
  selectTree(id);
  toast(`🌱 Tree #${id} added — fill in the details`);
}

// ============================================================================
// UI HANDLERS
// ============================================================================

// Save
document.getElementById("btn-save").addEventListener("click", () => {
  if (editingId === null) return;
  saveSnapshot();

  const f = treeData.features.find(f => f.properties.id === editingId);
  if (!f) return;

  f.properties.species_en  = document.getElementById("f-species-en").value;
  f.properties.species_jp  = document.getElementById("f-species-jp").value;
  f.properties.species_lat = document.getElementById("f-species-lat").value;
  f.properties.height_m    = parseFloat(document.getElementById("f-height").value) || null;
  f.properties.canopy_m2   = parseFloat(document.getElementById("f-canopy").value) || null;
  f.properties.age_years   = parseInt(document.getElementById("f-age").value) || null;
  f.properties.notes       = document.getElementById("f-notes").value;
  f.properties.photo_url   = document.getElementById("f-photo").value;

  refreshMap();
  closePanel();
  toast(`✅ Tree #${editingId} saved`);
});

// Delete
document.getElementById("btn-delete").addEventListener("click", () => {
  if (editingId === null) return;
  saveSnapshot();

  treeData.features = treeData.features.filter(f => f.properties.id !== editingId);
  refreshMap();
  closePanel();
  toast(`🗑 Tree #${editingId} deleted`);
});

// Cancel
document.getElementById("btn-close").addEventListener("click", closePanel);

// Add mode toggle
document.getElementById("btn-add").addEventListener("click", () => {
  addMode = !addMode;
  document.getElementById("btn-add").classList.toggle("active", addMode);
  document.getElementById("map").classList.toggle("crosshair", addMode);
  if (addMode) {
    closePanel();
    toast("🎯 Click on the map to place a tree");
  }
});

// Undo
document.getElementById("btn-undo").addEventListener("click", () => {
  if (history.length === 0) { toast("Nothing to undo"); return; }
  treeData = JSON.parse(history.pop());
  refreshMap();
  closePanel();
  toast("↩ Undone");
});

// Export GeoJSON
document.getElementById("btn-export").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(treeData, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "trees.geojson";
  a.click();
  URL.revokeObjectURL(url);
  toast(`⬇ Exported ${treeData.features.length} trees as GeoJSON`);
});

// Export CSV
document.getElementById("btn-csv").addEventListener("click", () => {
  const fields = ["id","species_en","species_jp","species_lat","height_m","canopy_m2","age_years","notes","photo_url","lng","lat"];
  let csv = fields.join(",") + "\n";
  treeData.features.forEach(f => {
    const p = f.properties;
    const [lng, lat] = f.geometry.coordinates;
    const row = [
      p.id,
      `"${(p.species_en||"").replace(/"/g,'""')}"`,
      `"${(p.species_jp||"").replace(/"/g,'""')}"`,
      `"${(p.species_lat||"").replace(/"/g,'""')}"`,
      p.height_m || "",
      p.canopy_m2 || "",
      p.age_years || "",
      `"${(p.notes||"").replace(/"/g,'""')}"`,
      `"${(p.photo_url||"").replace(/"/g,'""')}"`,
      lng, lat
    ];
    csv += row.join(",") + "\n";
  });
  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "trees.csv";
  a.click();
  URL.revokeObjectURL(url);
  toast(`⬇ Exported ${treeData.features.length} trees as CSV`);
});

// ============================================================================
// HELPERS
// ============================================================================

function closePanel() {
  editingId = null;
  document.getElementById("panel").classList.remove("open");
  map.setFilter("tree-selected", ["==", ["get", "id"], -1]);
}

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2500);
}
</script>

</body>
</html>
