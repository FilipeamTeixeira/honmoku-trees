<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>mokumap — Admin review</title>
  <link rel="icon" type="image/png" href="mokumaplogo.png" />
  <link rel="apple-touch-icon" href="mokumaplogo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <style>
    :root {
      --paper:#F7F6F3; --white:#FFFFFF; --ink:#1A1A1A; --ink-2:#555555;
      --ink-3:#999999; --accent:#1F7A4D; --red:#dc2626; --red-bg:#fef2f2;
      --red-border:#fecaca; --border:rgba(26,26,26,0.10); --r:16px; --r-sm:10px;
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.08), 0 4px 6px -4px rgb(0 0 0 / 0.06);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    input, textarea, button, select { font-family: inherit; }
    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--paper); color: var(--ink);
      font-size: 15px; line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    nav {
      height: 60px; display: flex; align-items: center;
      justify-content: space-between; padding: 0 32px;
      background: rgba(247,246,243,0.96); backdrop-filter: blur(14px);
      border-bottom: 0.5px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-brand {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; color: var(--ink);
      font-family: 'DM Serif Display', serif; font-size: 15px;
    }
    .brand-icon { width: 28px; height: 28px; border-radius: 9px; display: block; }
    .nav-brand em { color: var(--accent); font-style: normal; }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .btn-nav {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 13px; font-weight: 500; padding: 6px 14px;
      background: var(--ink); color: #fff;
      border-radius: 100px; text-decoration: none;
      border: none; cursor: pointer;
    }
    .btn-nav.ghost {
      background: none; color: var(--ink-2);
      border: 0.5px solid var(--border);
    }
    .btn-nav.ghost:hover { background: var(--white); color: var(--ink); }

    main { max-width: 900px; margin: 0 auto; padding: 48px 24px 80px; }

    .page-header { margin-bottom: 40px; }
    .page-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 36px; margin-bottom: 6px;
    }
    .page-header p { color: var(--ink-3); font-size: 14px; }

    /* Tabs */
    .tabs {
      display: flex; gap: 0;
      border-bottom: 0.5px solid var(--border);
      margin-bottom: 32px;
    }
    .tab-btn {
      padding: 10px 20px; font-size: 14px; font-weight: 500;
      background: none; border: none; cursor: pointer;
      color: var(--ink-3); border-bottom: 2px solid transparent;
      margin-bottom: -0.5px; transition: color 0.12s, border-color 0.12s;
    }
    .tab-btn:hover { color: var(--ink); }
    .tab-btn.active { color: var(--ink); border-bottom-color: var(--ink); }
    .tab-badge {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--red); color: #fff;
      border-radius: 100px; font-size: 10px; font-weight: 600;
      min-width: 16px; height: 16px; padding: 0 4px;
      margin-left: 6px;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Change card */
    .change-card {
      background: var(--white);
      border: 0.5px solid var(--border);
      border-radius: var(--r);
      padding: 20px 22px;
      margin-bottom: 12px;
      transition: box-shadow 0.15s;
    }
    .change-card:hover { box-shadow: var(--shadow-lg); }
    .card-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px; flex-wrap: wrap;
    }
    .action-badge {
      display: inline-flex; font-size: 11px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 3px 10px; border-radius: 100px;
    }
    .badge-add    { background: rgba(31,122,77,0.10); color: var(--accent); }
    .badge-edit   { background: rgba(52,120,210,0.10); color: #3478d2; }
    .badge-delete { background: rgba(220,38,38,0.10); color: var(--red); }
    .card-meta { font-size: 12px; color: var(--ink-3); }
    .card-submitter {
      margin-left: auto; font-size: 12px; color: var(--ink-2);
      background: var(--paper); padding: 3px 10px;
      border-radius: 100px; border: 0.5px solid var(--border);
    }

    /* Payload diff */
    .payload {
      background: var(--paper); border-radius: 8px;
      padding: 12px 14px; font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      white-space: pre-wrap; word-break: break-all;
      margin-bottom: 14px; max-height: 200px; overflow-y: auto;
      border: 0.5px solid var(--border);
    }
    .card-note {
      font-size: 13px; color: var(--ink-2);
      font-style: italic; margin-bottom: 14px;
      padding: 8px 12px;
      background: #fffbeb; border-radius: 6px;
      border-left: 3px solid #fbbf24;
    }
    .card-actions { display: flex; gap: 8px; }
    .btn-approve {
      padding: 7px 18px; background: var(--accent); color: #fff;
      border: none; border-radius: 100px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-approve:hover { opacity: 0.85; }
    .btn-reject {
      padding: 7px 18px; background: none; color: var(--red);
      border: 0.5px solid var(--red-border); border-radius: 100px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background 0.12s;
    }
    .btn-reject:hover { background: var(--red-bg); }

    /* History card */
    .history-card {
      background: var(--white); border: 0.5px solid var(--border);
      border-radius: var(--r); padding: 14px 18px;
      margin-bottom: 8px; display: flex;
      align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .history-status {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 3px 10px; border-radius: 100px;
    }
    .status-approved { background: rgba(31,122,77,0.10); color: var(--accent); }
    .status-rejected { background: rgba(220,38,38,0.10); color: var(--red); }
    .history-meta { font-size: 12px; color: var(--ink-3); }

    /* Empty / loading states */
    .empty {
      text-align: center; padding: 64px 0;
      color: var(--ink-3); font-size: 14px; line-height: 2;
    }
    .empty-icon { display: block; margin-bottom: 12px; opacity: 0.4; }
    .loading { text-align: center; padding: 48px 0; color: var(--ink-3); font-size: 14px; }

    /* Access denied */
    #access-denied {
      text-align: center; padding: 100px 24px;
    }
    #access-denied .lock { margin-bottom: 16px; }
    #access-denied h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 28px; margin-bottom: 8px;
    }
    #access-denied p { color: var(--ink-2); margin-bottom: 24px; }

    /* Toast */
    #toast-container {
      position: fixed; bottom: 20px; right: 20px; z-index: 1000;
      display: flex; flex-direction: column; gap: 8px; pointer-events: none;
    }
    .toast {
      background: var(--white); border-left: 3px solid var(--accent);
      border-radius: var(--r-sm); padding: 10px 14px;
      box-shadow: var(--shadow-lg); font-size: 13px;
      display: flex; align-items: center; gap: 8px;
      animation: toastIn 0.18s ease, toastOut 0.22s ease 4.78s forwards;
      pointer-events: auto; max-width: 290px;
    }
    .toast.success { border-left-color: #16a34a; }
    .toast.error   { border-left-color: var(--red); }
    @keyframes toastIn  { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: none; } }
    @keyframes toastOut { to   { opacity: 0; transform: translateX(10px); } }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-brand">
      <img src="mokumaplogo.png" alt="mokumap" class="brand-icon" />
      <span>moku<em>map</em> — Admin</span>
    </a>
    <div class="nav-right">
      <a href="map.html" class="btn-nav ghost">← Back to map</a>
      <button id="auth-btn" class="btn-nav ghost">Sign out</button>
    </div>
  </nav>

  <main>
    <div id="access-denied" style="display:none">
      <div class="lock"><svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
      <h2>Access restricted</h2>
      <p>This page is only available to admins.</p>
      <a href="map.html" class="btn-nav">← Back to map</a>
    </div>

    <div id="admin-panel" style="display:none">
      <div class="page-header">
        <h1>Review queue</h1>
        <p id="queue-subtitle">Loading…</p>
      </div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="pending">
          Pending <span class="tab-badge" id="pending-badge" style="display:none">0</span>
        </button>
        <button class="tab-btn" data-tab="history">History</button>
      </div>

      <div id="tab-pending" class="tab-content active">
        <div id="pending-list"><div class="loading">Loading…</div></div>
      </div>

      <div id="tab-history" class="tab-content">
        <div id="history-list"><div class="loading">Loading…</div></div>
      </div>
    </div>
  </main>

  <div id="toast-container"></div>

  <script>
    const { createClient } = window.supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function showToast(msg, type = 'info') {
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      const icons = {
        info:    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
        success: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>',
        error:   '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
      };
      t.innerHTML = `<span>${icons[type] || ''}</span><span>${msg}</span>`;
      document.getElementById('toast-container').appendChild(t);
      setTimeout(() => t.remove(), 5000);
    }

    // Tabs
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
        if (btn.dataset.tab === 'history') loadHistory();
      });
    });

    function actionBadge(action) {
      return `<span class="action-badge badge-${action}">${action}</span>`;
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function renderPendingCard(change) {
      const card = document.createElement('div');
      card.className = 'change-card';
      card.id = `card-${change.id}`;

      const treeRef = change.tree_id ? `tree <code style="font-size:11px">${change.tree_id.slice(0,8)}…</code>` : 'new tree';
      const payloadStr = JSON.stringify(change.payload, null, 2);
      const escapedPayload = JSON.stringify(payloadStr);

      card.innerHTML = `
        <div class="card-header">
          ${actionBadge(change.action)}
          <span class="card-meta">${formatDate(change.created_at)} · ${treeRef}</span>
          ${change.submitter_email ? `<span class="card-submitter">👤 ${change.submitter_email}</span>` : ''}
        </div>
        <div class="payload">${payloadStr}</div>
        ${change.note ? `<div class="card-note">"${change.note}"</div>` : ''}
        <div class="card-actions">
          <button class="btn-approve" onclick="resolve('${change.id}', '${change.action}', '${change.tree_id || ''}', ${escapedPayload}, 'approved')">
            ✓ Approve
          </button>
          <button class="btn-reject" onclick="resolve('${change.id}', '${change.action}', '${change.tree_id || ''}', ${escapedPayload}, 'rejected')">
            ✕ Reject
          </button>
        </div>`;
      return card;
    }

    async function resolve(changeId, action, treeId, payloadStr, decision) {
      const payload = JSON.parse(payloadStr);

      if (decision === 'approved') {
        let err;
        if (action === 'add')    ({ error: err } = await sb.from('trees').insert(payload));
        if (action === 'edit')   ({ error: err } = await sb.from('trees').update(payload).eq('id', treeId));
        if (action === 'delete') ({ error: err } = await sb.from('trees').delete().eq('id', treeId));
        if (err) { showToast('Error applying change: ' + err.message, 'error'); return; }
      }

      const { data: { session } } = await sb.auth.getSession();
      const { error } = await sb.from('pending_changes').update({
        status: decision,
        reviewed_by: session.user.id,
        reviewed_at: new Date().toISOString()
      }).eq('id', changeId);

      if (error) { showToast('Failed to update status: ' + error.message, 'error'); return; }

      document.getElementById(`card-${changeId}`)?.remove();
      showToast(decision === 'approved' ? '✓ Change approved and applied' : '✕ Change rejected', decision === 'approved' ? 'success' : 'info');
      updatePendingCount();
    }

    function updatePendingCount() {
      const remaining = document.querySelectorAll('#pending-list .change-card').length;
      const badge = document.getElementById('pending-badge');

      if (remaining === 0) {
        document.getElementById('pending-list').innerHTML = `
          <div class="empty">
            <span class="empty-icon"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg></span>
            All caught up — no pending changes.
          </div>`;
        badge.style.display = 'none';
        document.getElementById('queue-subtitle').textContent = 'Nothing to review right now.';
      } else {
        badge.style.display = 'inline-flex';
        badge.textContent = remaining;
        document.getElementById('queue-subtitle').textContent = `${remaining} change${remaining !== 1 ? 's' : ''} awaiting review`;
      }
    }

    async function loadPending() {
      const { data, error } = await sb.from('pending_changes')
        .select('*, profiles:submitted_by(display_name)')
        .eq('status', 'pending')
        .order('created_at', { ascending: true });

      if (error) { showToast('Failed to load queue: ' + error.message, 'error'); return; }

      const list = document.getElementById('pending-list');

      if (!data.length) {
        list.innerHTML = `<div class="empty"><span class="empty-icon"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg></span>All caught up — no pending changes.</div>`;
        document.getElementById('queue-subtitle').textContent = 'Nothing to review right now.';
        return;
      }

      list.innerHTML = '';
      data.forEach(c => {
        c.submitter_email = c.profiles?.display_name || null;
        list.appendChild(renderPendingCard(c));
      });

      const badge = document.getElementById('pending-badge');
      badge.style.display = 'inline-flex';
      badge.textContent = data.length;
      document.getElementById('queue-subtitle').textContent = `${data.length} change${data.length !== 1 ? 's' : ''} awaiting review`;
    }

    async function loadHistory() {
      const list = document.getElementById('history-list');
      list.innerHTML = '<div class="loading">Loading…</div>';

      const { data, error } = await sb.from('pending_changes')
        .select('*')
        .in('status', ['approved', 'rejected'])
        .order('reviewed_at', { ascending: false })
        .limit(50);

      if (error) { list.innerHTML = `<div class="empty">Failed to load history.</div>`; return; }
      if (!data.length) { list.innerHTML = `<div class="empty"><span class="empty-icon"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg></span>No history yet.</div>`; return; }

      list.innerHTML = '';
      data.forEach(c => {
        const card = document.createElement('div');
        card.className = 'history-card';
        card.innerHTML = `
          ${actionBadge(c.action)}
          <span class="history-status status-${c.status}">${c.status}</span>
          <span class="history-meta">${formatDate(c.reviewed_at || c.created_at)}</span>
          ${c.tree_id ? `<span class="history-meta">tree ${c.tree_id.slice(0,8)}…</span>` : ''}`;
        list.appendChild(card);
      });
    }

    document.getElementById('auth-btn').addEventListener('click', async () => {
      await sb.auth.signOut();
      window.location.href = 'login.html';
    });

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'login.html'; return; }

      const { data: role } = await sb.rpc('get_my_role');

      if (role !== 'admin') {
        document.getElementById('access-denied').style.display = 'block';
        return;
      }

      document.getElementById('admin-panel').style.display = 'block';
      await loadPending();
    }

    init();
  </script>
</body>
</html>
