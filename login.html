<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — mokumap</title>
  <link rel="icon" type="image/png" href="mokumaplogo.png" />
  <link rel="apple-touch-icon" href="mokumaplogo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <style>
    :root { --paper:#F7F6F3; --white:#FFFFFF; --ink:#1A1A1A; --ink-2:#555555; --accent:#1F7A4D; --border:rgba(26,26,26,0.10); --r:16px; }
    *{box-sizing:border-box;margin:0;padding:0}
    /* Fix: form controls don't inherit font by default */
    input,textarea,button,select{font-family:inherit}
    body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--paper);color:var(--ink);display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
    .card{background:var(--white);padding:32px;border-radius:var(--r);box-shadow:0 4px 20px rgba(0,0,0,0.08);max-width:400px;width:90%}
    .brand{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:22px;text-decoration:none;color:var(--ink)}
    .brand-icon{width:42px;height:42px;border-radius:13px;display:block;flex-shrink:0}
    .brand-name{font-family:'DM Serif Display',serif;font-size:20px;line-height:1}
    .brand-name em{color:var(--accent);font-style:normal}
    h1{font-family:'DM Serif Display',serif;margin:0 0 8px;font-size:24px;color:var(--ink)}
    p{color:var(--ink-2);margin:0 0 24px;font-size:14px}
    label{display:block;font-size:13px;font-weight:500;margin:16px 0 6px;color:var(--ink)}
    input{width:100%;padding:12px;border:0.5px solid var(--border);border-radius:10px;font-size:15px;background:var(--white);transition:border-color 0.15s}
    input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(31,122,77,0.1)}
    button{width:100%;padding:12px;background:var(--ink);color:var(--white);border:none;border-radius:100px;font-size:15px;font-weight:500;cursor:pointer;margin-top:8px;transition:opacity 0.2s}
    button:hover{opacity:0.9}
    .error{color:#dc2626;font-size:13px;margin-top:8px;display:none}
    .back{display:block;text-align:center;margin-top:20px;color:var(--ink-2);text-decoration:none;font-size:14px}
    .back:hover{color:var(--ink)}
  </style>
</head>
<body>
  <div class="card">
    <a href="index.html" class="brand" aria-label="mokumap home">
      <img src="mokumaplogo.png" alt="mokumap" class="brand-icon">
      <span class="brand-name">moku<em>map</em></span>
    </a>
    <h1>Sign in to contribute</h1>
    <p>Enter your credentials to access the tree editor. Accounts are created manually by the project admin.</p>

    <form id="login-form">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">

      <p class="error" id="error-msg"></p>

      <button type="submit">Sign in</button>
    </form>

    <a href="index.html" class="back">← Back to mokumap</a>
  </div>

  <script>
    // ✅ Use window.supabase from UMD build, but assign to different variable name
    const { createClient } = window.supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error-msg');

      errorEl.style.display = 'none';
      errorEl.textContent = '';

      // ✅ Use 'sb' instead of 'supabase'
      const { error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        errorEl.textContent = error.message;
        errorEl.style.display = 'block';
      } else {
        window.location.href = 'map.html';
      }
    });
  </script>
</body>
</html>
